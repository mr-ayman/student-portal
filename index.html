<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Support Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" id="zohodeskasap">
        var d = document;
        s = d.createElement("script"), s.type = "text/javascript", s.id = "zohodeskasapscript", s.defer = !0, s.src = "https://desk.zoho.in/portal/api/web/asapApp/268212000000380029?orgId=60076426050", t = d.getElementsByTagName("script")[0], t.parentNode.insertBefore(s, t), window.ZohoDeskAsapReady = function(s) {
            var e = window.ZohoDeskAsap__asyncalls = window.ZohoDeskAsap__asyncalls || [];
            window.ZohoDeskAsapReadyStatus ? (s && e.push(s), e.forEach(s => s && s()), window.ZohoDeskAsap__asyncalls = null) : s && e.push(s)
        };
        window.ZohoDeskAsapReady(function() {
            ZohoDeskAsap.set("app.tabs.hideTabs", ["Home", "Community", "Ticket", "Guided Conversations", "Answer Bot", "SalesIQ Chat", "Business Messaging", "Submit Ticket", "Add Topic"]);
            ZohoDeskAsap.invoke("hide", "app.launcher");
        });
    </script>
</head>

<body>

    <header>
        <div class="wrap">
            <div class="logo"><span class="dot"></span>Student Support Portal</div>
        </div>
    </header>

    <div class="wrap">
        <div class="tabs">
            <button class="tab active" data-tab="raise">Raise a ticket</button>
            <button class="tab" data-tab="articles">Articles</button>
        </div>
    </div>

    <main>
        <div class="wrap">

            <div class="panelview active" id="tab-raise">
                <div class="eyebrow">New request</div>
                <h1>Raise a support ticket</h1>
                <p class="sub">Fill in the form below. Your request goes straight into the college's Zoho Desk queue and you'll get email updates as it's worked on.</p>

                <div class="panel">
                    <script src="https://desk.zoho.in/portal/api/feedbackwidget/268212000000380027?orgId=60076426050&displayType=embeded"></script>
                    <div id="zsfeedbackwidgetdiv"></div>
                </div>
            </div>

            <div class="panelview" id="tab-articles">
                <div class="eyebrow">Knowledge base</div>
                <h1>Help articles</h1>
                <p class="sub">Search or browse answers to common questions.</p>

                <div class="panel">
                    <p id="kbStatus" style="text-align:center; padding:40px 0; color:var(--ink-soft);">Loading articles…</p>
                </div>
            </div>

        </div>
    </main>

    <script src="script.js" defer></script>

</body>

</html>
